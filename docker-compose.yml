version: "3.9"

services:
  app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
    environment:
      - DATABASE_URL=sqlite:///data/password_checker.db
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  app-data:
  app-logs: